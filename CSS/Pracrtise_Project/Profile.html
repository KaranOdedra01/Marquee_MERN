<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Profile Card</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
      * {
        margin: 0;
        padding: 0;
        font-family: "Lobster Two", sans-serif;
      }
      html,
      body {
        max-height: 100vh;
        width: 100%;
        display: flex;
        background-color: black;
        /* justify-content: center;
        align-self: center; */
      }
      #MainCard {
        height: 35rem;
        width: 25rem;
        background-color: white;
        border-radius: 5%;
        overflow: hidden;
      }
      #topBox {
        display: flex;
        justify-content: center;
        position: relative;
        height: 30%;
        background-color: #4874f6;
      }
      #profilePic {
        position: absolute;
        bottom: -30px;
        border: 4px solid #4874f6;
        border-radius: 60%;
      }
      #bottomBox {
        box-sizing: content-box;
        margin-top: 10%;
        flex-direction: column;
        justify-items: center;
        align-content: space-between;
        height: 70%;
      }
      #cardTitle {
        text-align: center;
        margin: 10px 0;
      }
      #cardText {
        margin-bottom: 20px;
      }
      #facebookIcon {
        color: #466ab0;
        height: 20px;
        font-size: 30px;
        margin-bottom: 20px;
      }
      #twitterIcon {
        color: #37a3f0;
        height: 20px;
        font-size: 30px;
      }
      #instaIcon {
        color: #d14975;
        height: 20px;
        font-size: 30px;
      }
      #youtudeIcon {
        color: #ee2401;
        height: 20px;
        font-size: 30px;
      }
      .clickButtonStyle {
        background-color: #4874f2;
        padding: 10px;
        width: 100px;
        border-radius: 20px;
        color: white;
        border: none;
        margin-bottom: 30px;
      }
      #socialAttri {
        display: flex;
        justify-content: center;
      }
      .PaddingFor {
        display: flex;
        margin: 0 10px;
      }
      .divLine {
        height: 12px;
        background-color: gray;
        width: 4px;
        border-radius: 10px;
        margin: 4px 10px;
      }
    </style>
  </head>
  <body id="MainPage">
    <section id="MainCard">
      <section id="topBox">
        <img
          src="https://i.pinimg.com/736x/ef/6a/b3/ef6ab34ca0507279f8b3d4ed5a6266f9.jpg"
          height="130px"
          width="130px"
          id="profilePic"
        />
      </section>
      <section id="bottomBox">
        <div>
          <h2 id="cardTitle">CodingLab</h2>
          <p id="cardText">Developer & Prodlem Solver</p>
        </div>
        <div id="socialAccount">
          <i id="facebookIcon" class="fa-brands fa-facebook"></i>
          <i id="twitterIcon" class="fa-brands fa-twitter"></i>
          <i id="instaIcon" class="fa-brands fa-square-instagram"></i>
          <i id="youtudeIcon" class="fa-brands fa-youtube"></i>
        </div>
        <div>
          <button class="clickButtonStyle">Subscribe</button>
          <button class="clickButtonStyle">Message</button>
        </div>
        <div id="socialAttri">
          <span class="PaddingFor"
            ><i class="fa-regular fa-heart"></i>
            <p>60.4k</p></span
          >

          <span class="divLine"></span>

          <span class="PaddingFor"
            ><i class="fa-regular fa-comment"></i>
            <p>20k</p></span
          >

          <span class="divLine"></span>

          <span class="PaddingFor"
            ><i class="fa-solid fa-share"></i>
            <p>12.4k</p></span
          >
        </div>
      </section>
    </section>
  </body>
</html>
